name: backend-db

services:
  postgres:
    image: postgres:18-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432" # Exposed for local tools like DBeaver/pgAdmin
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data

    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-network

  redis:
    image: redis:8-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379" # Exposed for local tools like RedisInsight
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend-network

  nats:
    image: nats:2.11-alpine
    container_name: nats
    restart: unless-stopped
    ports:
      - "4222:4222" # Client port
      - "8222:8222" # HTTP monitoring
    command:
      - "--jetstream"
      - "--store_dir"
      - "/data/jetstream"
      - "--http_port"
      - "8222"
    volumes:
      - nats_data:/data/jetstream
    networks:
      - backend-network

volumes:
  postgres_data:
  redis_data:
  nats_data:

networks:
  backend-network:
    external: true # Connects to the network created manually
