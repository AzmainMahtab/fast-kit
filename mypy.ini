[mypy]
python_version = 3.14
warn_unused_configs = True

# PEP 420 namespace packages — no __init__.py required
namespace_packages = True
explicit_package_bases = True

# —– Strictness —–
disallow_any_unimported = False
disallow_any_expr = False
disallow_any_decorated = False
disallow_any_explicit = False
disallow_any_generics = True
disallow_subclassing_any = True
disallow_untyped_calls = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_return_any = True
warn_unreachable = True
strict_concatenate = True
strict_equality = True
strict_optional = True

# —– Plugins —–
plugins = sqlalchemy.ext.mypy.plugin

# —– Module‑level overrides —–

# SQLAlchemy model and mapper modules use ORM column types (DateTime/Date/UUID)
# in annotations. SQLAlchemy's plugin does not normalize these against domain
# dataclass field types, so we silence type errors in these files.
[mypy-app.modules.user.infrastructure.persistence.models]
ignore_errors = True

[mypy-app.modules.user.infrastructure.persistence.mapper]
ignore_errors = True

[mypy-app.modules.car.infrastructure.persistence.models]
ignore_errors = True

[mypy-app.modules.car.infrastructure.persistence.mapper]
ignore_errors = True

[mypy-app.modules.owner.infrastructure.persistence.models]
ignore_errors = True

[mypy-app.modules.owner.infrastructure.persistence.mapper]
ignore_errors = True

[mypy-app.modules.rbac.infrastructure.persistence.models]
ignore_errors = True

[mypy-app.modules.rbac.infrastructure.persistence.mapper]
ignore_errors = True

[mypy-app.modules.otp.infrastructure.persistence.models]
ignore_errors = True

[mypy-app.modules.otp.infrastructure.persistence.mapper]
ignore_errors = True

# Core exception handler signatures are annotated with broad `Exception`
[mypy-app.core.exception_handlers]
disallow_untyped_defs = False

# Tests don't need strict annotation requirements
[mypy-app.*.tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False
