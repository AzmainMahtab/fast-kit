name: backend

services:
  api:
    user: "${UID}:${GID}"
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: api-local
    environment:
      - ENVIRONMENT=${ENVIRONMENT} # Triggers Uvicorn reload in entrypoint.sh
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_HOST=${POSTGRES_HOST} # Required for entrypoint.sh pg_isready
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
      - NATS_ENABLED=${NATS_ENABLED}
      - NATS_URL=${NATS_URL}
      - FIRST_SUPERUSER_EMAIL=${FIRST_SUPERUSER_EMAIL} # Seeds first admin login (used by seed_superuser)
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD}
      - FIRST_SUPERUSER_USERNAME=${FIRST_SUPERUSER_USERNAME}
      - FIRST_SUPERUSER_PHONE_NUMBER=${FIRST_SUPERUSER_PHONE_NUMBER}
    volumes:
      # Hot-reload mapping: Maps local app/ folder into the container
      - ./app:/app/app
      # Hot-reload mapping: Alembic migrations & config
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    ports:
      - "8000:8000"
    networks:
      - backend-network

  worker:
    user: "${UID}:${GID}"
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: worker-local
    command: ["python", "-m", "app.worker"]
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - DATABASE_URL=${DATABASE_URL}
      - NATS_ENABLED=${NATS_ENABLED}
      - NATS_URL=${NATS_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      - nats
    networks:
      - backend-network
    profiles:
      - nats

  scheduler:
    user: "${UID}:${GID}"
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: scheduler-local
    command: ["python", "-m", "app.scheduler"]
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - DATABASE_URL=${DATABASE_URL}
      - NATS_ENABLED=${NATS_ENABLED}
      - NATS_URL=${NATS_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      - nats
    networks:
      - backend-network
    profiles:
      - nats

networks:
  backend-network:
    external: true
